# Single stack: Ollama + SummaryBot on one Docker network.
# Test/dev: merge docker-compose.dev.yml to expose Ollama on the host (see README).

networks:
  summarybot:
    driver: bridge

services:
  ollama:
    image: ollama/ollama:latest
    networks: [summarybot]
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 40s

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    networks: [summarybot]
    depends_on:
      ollama:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - bot-data:/data
    restart: unless-stopped

volumes:
  ollama-data:
  bot-data:
